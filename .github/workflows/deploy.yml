name: CD - Deploy Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check authorized user
        run: |
          if [ "${{ github.actor }}" != "praveenbabu24" ]; then
            echo "Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      - name: Check latest build status on main
        run: |
          STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=main&status=completed&per_page=1" \
            | grep -m 1 '"conclusion"' | cut -d '"' -f4)
          
          echo "Latest build status: $STATUS"
          
          if [ "$STATUS" != "success" ]; then
            echo "Latest build did not succeed. Aborting deploy."
            exit 1
          fi

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
